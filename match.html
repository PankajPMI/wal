<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WAL 2026 - Playoffs & Final Points Table</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@500;600;700&display=swap');
    :root {
        --primary: #00f5ff;
        --accent: #ff2e63;
        --neon: #a855f7;
        --gold: #ffd700;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
        font-family: 'Inter', sans-serif;
        background: radial-gradient(circle at center, #1a2338 0%, #0a0f1c 80%);
        color: #e0f2fe;
        min-height: 100vh;
        overflow-x: hidden;
        background-attachment: fixed;
    }
    .header {
        background: rgba(10,15,28,0.98);
        backdrop-filter: blur(20px);
        border-bottom: 3px solid var(--primary);
        padding: 25px 30px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        z-index: 1000;
        box-shadow: 0 0 40px rgba(0,245,255,0.4);
    }
    .logo {
        font-family: 'Orbitron', sans-serif;
        font-size: 38px;
        font-weight: 700;
        background: linear-gradient(90deg, #00f5ff, #ff2e63, #a855f7);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: 0 0 30px rgba(0,245,255,0.6);
        animation: logoGlow 2s infinite alternate;
    }
    @keyframes logoGlow {
        from { text-shadow: 0 0 20px rgba(0,245,255,0.5); }
        to { text-shadow: 0 0 50px rgba(168,85,247,0.8); }
    }

    .container { max-width: 1450px; margin: 40px auto; padding: 0 25px; }

    .section {
        background: var(--card, #121a2e);
        border-radius: 28px;
        border: 1px solid rgba(0,245,255,0.3);
        box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        margin-bottom: 50px;
        overflow: hidden;
    }
    .section-header {
        background: linear-gradient(135deg, rgba(0,245,255,0.25), rgba(255,46,99,0.2), rgba(168,85,247,0.15));
        padding: 28px 35px;
        font-family: 'Orbitron', sans-serif;
        font-size: 28px;
        color: var(--primary);
        border-bottom: 3px solid rgba(0,245,255,0.4);
        display: flex;
        align-items: center;
        gap: 15px;
        text-shadow: 0 0 15px var(--primary);
    }

    /* Points Table Styles (same as before) */
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 20px 30px; text-align: left; border-bottom: 1px solid rgba(0,245,255,0.15); }
    th { background: #1e2937; color: var(--primary); font-weight: 700; font-size: 17px; }
    tr { transition: all 0.4s ease; }
    tr:hover { background: rgba(0, 245, 255, 0.18); transform: scale(1.02); }
    .position { font-family: 'Orbitron', sans-serif; font-size: 28px; font-weight: 700; color: #67e8f9; text-shadow: 0 0 15px #67e8f9; }
    .team-name { font-weight: 700; font-size: 18px; }
    .win { color: #22c55e; font-weight: 700; }
    .loss { color: #ef4444; font-weight: 600; }
    .nrr { font-family: 'Orbitron', sans-serif; font-weight: 700; }
    .points { font-size: 22px; font-weight: 800; color: #67e8f9; }

    /* === PLAYOFF BRACKET - ULTRA ANIMATED === */
    .bracket-container {
        padding: 60px 40px;
        position: relative;
        display: flex;
        justify-content: center;
        gap: 80px;
        flex-wrap: wrap;
    }

    .match-box {
        background: linear-gradient(145deg, #1e2937, #0f172a);
        border: 2px solid var(--primary);
        border-radius: 22px;
        padding: 28px 40px;
        width: 380px;
        text-align: center;
        box-shadow: 0 0 35px rgba(0,245,255,0.35);
        transition: all 0.4s cubic-bezier(0.23,1,0.32,1);
        position: relative;
        overflow: hidden;
    }
    .match-box:hover {
        transform: translateY(-12px) scale(1.04);
        border-color: var(--accent);
        box-shadow: 0 0 60px rgba(255,46,99,0.6);
    }
    .match-box::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(transparent, rgba(255,255,255,0.08), transparent);
        opacity: 0;
        transition: opacity 0.6s;
    }
    .match-box:hover::after { opacity: 1; }

    .match-title {
        font-family: 'Orbitron', sans-serif;
        font-size: 19px;
        color: var(--accent);
        margin-bottom: 18px;
        text-shadow: 0 0 12px var(--accent);
        letter-spacing: 1px;
    }

    .team-slot {
        padding: 16px 22px;
        margin: 12px 0;
        background: rgba(15,23,42,0.85);
        border-radius: 14px;
        font-weight: 600;
        font-size: 17px;
        transition: all 0.4s ease;
        border: 1px solid rgba(0,245,255,0.2);
    }
    .team-slot:hover {
        background: rgba(0,245,255,0.15);
        border-color: var(--primary);
    }

    .vs-bracket {
        color: var(--primary);
        font-size: 26px;
        font-weight: 700;
        margin: 12px 0;
        text-shadow: 0 0 15px var(--primary);
    }

    /* Flow Arrows with Animation */
    .flow-arrow {
        position: absolute;
        font-size: 42px;
        color: var(--primary);
        text-shadow: 0 0 20px var(--primary);
        animation: arrowFlow 3s infinite linear;
        z-index: 2;
    }
    @keyframes arrowFlow {
        0% { opacity: 0.4; transform: translateY(0); }
        50% { opacity: 1; }
        100% { opacity: 0.4; transform: translateY(12px); }
    }

    .final-box {
        width: 440px;
        border: 3px solid var(--gold);
        box-shadow: 0 0 70px rgba(255,215,0,0.7);
        background: linear-gradient(145deg, #2a2f45, #1a2035);
    }

    /* Extra Neon Background Lines */
    .bracket-container::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background: 
            linear-gradient(to right, rgba(0,245,255,0.03) 1px, transparent 1px),
            linear-gradient(to bottom, rgba(0,245,255,0.03) 1px, transparent 1px);
        background-size: 60px 60px;
        pointer-events: none;
        z-index: 0;
    }
</style>
</head>
<body>
<div class="header">
    <div class="logo">WAL 2026</div>
    <div style="font-size:22px; font-weight:700; color:#a5b4fc; text-shadow:0 0 15px #a855f7;">🔥 ROAD TO THE TITLE - PLAYOFFS</div>
</div>

<div class="container">

    <!-- Points Table -->
    <div class="section">
        <div class="section-header">🏆 FINAL LEAGUE POINTS TABLE</div>
        <table>
            <thead>
                <tr>
                    <th>Pos</th>
                    <th>Team</th>
                    <th>Played</th>
                    <th>Won</th>
                    <th>Lost</th>
                    <th>Runs Scored</th>
                    <th>Points</th>
                    <th>NRR</th>
                </tr>
            </thead>
            <tbody id="pointsBody"></tbody>
        </table>
    </div>

    <!-- Playoff Bracket -->
    <div class="section">
        <div class="section-header">🔥 PLAYOFF BRACKET - ROAD TO THE TITLE</div>
        <div class="bracket-container" id="bracket"></div>
    </div>

</div>

<script>
// Same data and logic as before
const teams = ["Dragon Hunters", "Blaze Warriors", "Tiger Titans", "Shadow Ninjas", "Phantom Raiders", "Thunder Legends"];

let matches = [
    {id:1, team1: "Dragon Hunters", team2: "Blaze Warriors", winner: "Dragon Hunters", runs1: 101, runs2: 41},
    {id:2, team1: "Tiger Titans", team2: "Shadow Ninjas", winner: "Tiger Titans", runs1: 84, runs2: 78},
    {id:3, team1: "Thunder Legends", team2: "Phantom Raiders", winner: "Thunder Legends", runs1: 90, runs2: 12},
    {id:4, team1: "Tiger Titans", team2: "Dragon Hunters", winner: "Dragon Hunters", runs1: 91, runs2: 92},
    {id:5, team1: "Blaze Warriors", team2: "Phantom Raiders", winner: "Blaze Warriors", runs1: 186, runs2: 94},
    {id:6, team1: "Thunder Legends", team2: "Shadow Ninjas", winner: "Thunder Legends", runs1: 113, runs2: 109},
    {id:7, team1: "Dragon Hunters", team2: "Phantom Raiders", winner: "Phantom Raiders", runs1: 131, runs2: 132},
    {id:8, team1: "Blaze Warriors", team2: "Tiger Titans", winner: "Blaze Warriors", runs1: 92, runs2: 90},
    {id:9, team1: "Thunder Legends", team2: "Shadow Ninjas", winner: "Thunder Legends", runs1: 153, runs2: 34},
    {id:10, team1: "Shadow Ninjas", team2: "Dragon Hunters", winner: "Dragon Hunters", runs1: 70, runs2: 169},
    {id:11, team1: "Thunder Legends", team2: "Blaze Warriors", winner: "Blaze Warriors", runs1: 18, runs2: 24},
    {id:12, team1: "Tiger Titans", team2: "Phantom Raiders", winner: "Tiger Titans", runs1: 59, runs2: 56},
    {id:13, team1: "Thunder Legends", team2: "Dragon Hunters", winner: "Dragon Hunters", runs1: 75, runs2: 200},
    {id:14, team1: "Shadow Ninjas", team2: "Blaze Warriors", winner: "Blaze Warriors", runs1: 90, runs2: 94},
    {id:18, team1: "Tiger Titans", team2: "Phantom Raiders", winner: "Tiger Titans", runs1: 71, runs2: 45},
    {id:19, team1: "Dragon Hunters", team2: "Tiger Titans", winner: "Dragon Hunters", runs1: 167, runs2: 98},
    {id:20, team1: "Shadow Ninjas", team2: "Phantom Raiders", winner: "Phantom Raiders", runs1: 74, runs2: 128},
    {id:21, team1: "Blaze Warriors", team2: "Thunder Legends", winner: "Thunder Legends", runs1: 80, runs2: 112}
];

let pointsData = {};

function initPointsData() {
    teams.forEach(team => {
        pointsData[team] = { played: 0, won: 0, lost: 0, runsScored: 0, runsConceded: 0, points: 0, nrr: 0 };
    });
}

function calculateAll() {
    initPointsData();
    matches.forEach(match => {
        if (match.winner) {
            const loser = match.winner === match.team1 ? match.team2 : match.team1;
            const winnerRuns = match.winner === match.team1 ? match.runs1 : match.runs2;
            const loserRuns = match.winner === match.team1 ? match.runs2 : match.runs1;

            pointsData[match.winner].played++;
            pointsData[match.winner].won++;
            pointsData[match.winner].points += 2;
            pointsData[match.winner].runsScored += winnerRuns;
            pointsData[match.winner].runsConceded += loserRuns;

            pointsData[loser].played++;
            pointsData[loser].lost++;
            pointsData[loser].runsScored += loserRuns;
            pointsData[loser].runsConceded += winnerRuns;
        }
    });

    Object.keys(pointsData).forEach(team => {
        const p = pointsData[team];
        if (p.played > 0) p.nrr = ((p.runsScored - p.runsConceded) / p.played).toFixed(2);
    });
}

function getSortedTeams() {
    let data = teams.map(team => ({ team, ...pointsData[team] }));
    data.sort((a, b) => {
        if (b.points !== a.points) return b.points - a.points;
        if (b.runsScored !== a.runsScored) return b.runsScored - a.runsScored;
        return parseFloat(b.nrr) - parseFloat(a.nrr);
    });
    return data;
}

function renderPointsTable() {
    const sorted = getSortedTeams();
    const tbody = document.getElementById("pointsBody");
    tbody.innerHTML = "";
    sorted.forEach((item, i) => {
        const row = document.createElement("tr");
        row.innerHTML = `
            <td><span class="position">${i+1}</span></td>
            <td class="team-name">${item.team}</td>
            <td>${item.played}</td>
            <td class="win">${item.won}</td>
            <td class="loss">${item.lost}</td>
            <td>${item.runsScored}</td>
            <td class="points">${item.points}</td>
            <td class="nrr">${item.nrr}</td>
        `;
        tbody.appendChild(row);
    });
}

function renderPlayoffBracket() {
    const sorted = getSortedTeams();
    const bracketDiv = document.getElementById("bracket");

    const q1_1 = sorted[0].team;
    const q1_2 = sorted[1].team;
    const elim_1 = sorted[2].team;
    const elim_2 = sorted[3].team;

    bracketDiv.innerHTML = `
        <div style="position:relative; z-index:1;">
            <!-- Qualifier 1 -->
            <div class="match-box">
                <div class="match-title">🔥 QUALIFIER 1</div>
                <div class="team-slot">${q1_1} <span style="color:#22c55e; font-size:15px;">(1)</span></div>
                <div class="vs-bracket">VS</div>
                <div class="team-slot">${q1_2} <span style="color:#22c55e; font-size:15px;">(2)</span></div>
            </div>

            <!-- Arrow to Final -->
            <div style="position:absolute; left:460px; top:120px; transform:rotate(25deg);">
                <span class="flow-arrow">→</span>
            </div>

            <!-- Eliminator -->
            <div class="match-box" style="margin-top:120px;">
                <div class="match-title">💥 ELIMINATOR</div>
                <div class="team-slot">${elim_1} <span style="color:#22c55e; font-size:15px;">(3)</span></div>
                <div class="vs-bracket">VS</div>
                <div class="team-slot">${elim_2} <span style="color:#22c55e; font-size:15px;">(4)</span></div>
            </div>

            <!-- Arrow to Q2 -->
            <div style="position:absolute; left:460px; top:340px; transform:rotate(-25deg);">
                <span class="flow-arrow">→</span>
            </div>
        </div>

        <div style="margin-top:40px; position:relative; z-index:1;">
            <!-- Qualifier 2 -->
            <div class="match-box">
                <div class="match-title">⚔️ QUALIFIER 2</div>
                <div class="team-slot" style="opacity:0.75;">Loser of Qualifier 1</div>
                <div class="vs-bracket">VS</div>
                <div class="team-slot" style="opacity:0.75;">Winner of Eliminator</div>
            </div>

            <!-- Arrow to Final -->
            <div style="position:absolute; left:460px; top:110px;">
                <span class="flow-arrow" style="animation-delay:1s;">→</span>
            </div>

            <!-- THE FINAL -->
            <div class="match-box final-box" style="margin-top:160px;">
                <div class="match-title" style="color:var(--gold); font-size:22px;">🏆 THE GRAND FINAL</div>
                <div class="team-slot" style="opacity:0.8;">Winner of Qualifier 1</div>
                <div class="vs-bracket" style="color:var(--gold);">VS</div>
                <div class="team-slot" style="opacity:0.8;">Winner of Qualifier 2</div>
                <div style="margin-top:25px; padding:12px; background:rgba(255,215,0,0.15); border-radius:12px; color:var(--gold); font-weight:700; font-size:19px;">
                    WAL 2026 CHAMPION
                </div>
            </div>
        </div>
    `;
}

// Initialize
window.onload = function() {
    calculateAll();
    renderPointsTable();
    renderPlayoffBracket();
};
</script>
</body>
</html>
